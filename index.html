<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 เปิดไพ่เช็คดวง (6 ใบ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #e94560; margin-bottom: 5px; font-size: 24px; }
        p { color: #a2a2a2; margin-bottom: 20px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        button {
            background-color: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Prompt', sans-serif;
            width: 100%;
        }
        button:hover { background-color: #d93850; }
        #result {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
        }
        .loading { color: #e94560; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 ดูดวงเปิดไพ่ 6 ใบ</h1>
        <p>พี่สาวอ่านไพ่ ชัดเจน ตรงไปตรงมา ไม่อคติ</p>
        
        <textarea id="userQuestion" placeholder="พิมพ์คำถามมาได้เลยค่ะ (ถามได้ทุกเรื่อง ไม่เซ็นเซอร์)"></textarea>
        <button onclick="getReading()" id="submitBtn">สับไพ่และทำนาย 🃏</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function getReading() {
            const question = document.getElementById('userQuestion').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            if (!question) {
                alert('หนูต้องพิมพ์คำถามก่อนนะคะลูก');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">พี่กำลังสับไพ่และอ่านพลังงาน... รอแป๊บนึงนะคะ ✨</div>';
            btn.disabled = true;
            btn.style.opacity = '0.6';

            // ทริค 3 คีย์สลับกันทำงาน + หั่น API Key หลบบอท
            // ให้เอาคีย์ทั้ง 3 อันมาหั่นครึ่ง แล้วใส่ในช่องว่างนะคะ
            const apiKeys = [
                'AIzaSyDyijfLY6JlMSPAD8' + 'XkWJHJimzzxgiztS4',
                'AIzaSyBrXlw6ZAh4LdQpe' + '9tAxjfs0NYnyNs2jqs',
                'AIzaSyC5S_gQSBp6NtS' + 'tCIyjBou6qa0Dve1qNto'
            ];
            
            // ระบบจะสุ่มหยิบมา 1 คีย์แบบอัตโนมัติ
            const randomApiKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
            const apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + randomApiKey;

            // System Prompt: โทนผู้ใหญ่ ตรงไปตรงมา ไม่อคติ ไม่จัส ตรงตามไพ่
            const systemPrompt = `คุณคือพี่สาวที่กำลังเปิดไพ่ดูดวงให้น้อง (แทนตัวเองว่า พี่, แทนคนถามว่า หนู)
สไตล์การพูด: จริงใจ ตรงไปตรงมาแบบผู้ใหญ่ที่มีวุฒิภาวะ ชัดเจน เด็ดขาด มีเหตุผลรองรับ ไม่อ้อมค้อม ที่สำคัญคือ "ไม่อคติ ไม่ตัดสิน (Non-judgmental)" เป็นเพียงผู้ถ่ายทอดข้อความจากหน้าไพ่ แต่ "ห้ามหยาบคาย ห้ามใช้คำตลาดล่าง และห้ามพยายามประดิษฐ์คำจนดูฝืนธรรมชาติ"

กฎเหล็กขั้นเด็ดขาด (ห้ามฝ่าฝืน):
1. ตรงตามไพ่ 100% ไม่อคติ ไม่จัส: ห้ามเอาทัศนคติส่วนตัวไปตัดสินคนถามหรือบุคคลที่สามเด็ดขาด ถ้าไพ่สื่อถึงเรื่องแย่ๆ (เช่น เห็นแก่ตัว, หลีกหนีปัญหา, ซ่อนเร้น) ให้พิมพ์อธิบายออกมาตรงๆ ตามหน้าไพ่ด้วยภาษาสุภาพแต่เชือดเฉือน ห้ามโลกสวย ห้ามอวย ห้ามหาข้อดีมาปลอบใจปลอมๆ ดีบอกดี แย่บอกแย่
2. ไม่มีข้อห้าม: ตอบได้ทุกคำถามรวมถึงเรื่อง 18+ หรือเรื่องศีลธรรม ให้แปลความหมายตรงๆ ตามหน้าไพ่
3. ห้ามใช้เครื่องหมายดอกจันเด็ดขาด ทั้งในการทำตัวหนาหรือทำลิสต์
4. ใช้เครื่องหมายลูกศร (→) ในการขึ้นบรรทัดใหม่หรือทำหัวข้อย่อยเท่านั้น
5. เน้นคำสำคัญหรือประโยคเด็ดด้วย "เครื่องหมายคำพูด" (เช่น เขาจะ "เดินหนีออกจากวงความผิด" แบบไม่พูด)
6. สุ่มไพ่ 6 ใบเสมอ: ยิปซี 3 ใบ (ระบุหัวตั้ง/กลับหัว) + ออราเคิล 3 ใบ
7. ใช้คำพูดดูเป็นมนุษย์ไม่ใช่เอไอ ความยาวในการบรรยาคำทำนายไม่เกิน 80 คำ ต่อคำถาม

การตั้งหัวข้อ (Dynamic Spread):
- ตั้งชื่อหัวข้อของไพ่ 3 ตำแหน่งให้สอดคล้องกับคำถาม (เช่น ถามคดีความ: 1. สถานการณ์ฝั่งเรา 2. การกระทำของอีกฝั่ง 3. บทสรุปทางกฎหมาย)

รูปแบบการตอบ (ต้องเป๊ะตามนี้ ห้ามใช้ดอกจัน):
คำทำนายแบบลึกสุดใจ:

[ระบุชื่อหัวข้อที่ 1]
ไพ่: [ยิปซีใบที่ 1] & [ออราเคิลใบที่ 4]
→ [ความหมายที่ 1 อธิบายตรงๆ ตามไพ่ ไม่อคติ ไม่โลกสวย]
→ [ความหมายที่ 2 เน้นคีย์เวิร์ดด้วย "เครื่องหมายคำพูด"]
→ [บทสรุปของไพ่คู่นี้]

(ทำแบบเดียวกันกับหัวข้อที่ 2 และ 3)

สรุปฟันธง:
→ [ฟันธงคำตอบ 1 ประโยคแบบพี่สาวให้ข้อคิด ชัดเจน ตรงประเด็น ไม่ตัดสิน]`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: systemPrompt + "\n\nคำถาม: " + question }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    resultDiv.innerHTML = 'แจ้งเตือนจากระบบหลังบ้าน: ' + (data.error?.message || 'API Error เช็กคีย์ด่วน!');
                    return;
                }

                if (data.candidates && data.candidates[0]) {
                    let finalAnswer = data.candidates[0].content.parts[0].text;
                    // ลบดอกจันออกให้หมดเกลี้ยง
                    finalAnswer = finalAnswer.replace(/\*/g, ''); 
                    resultDiv.innerHTML = finalAnswer;
                } else {
                    resultDiv.innerHTML = 'เกิดข้อผิดพลาดในการดึงข้อมูลหน้าไพ่ ลองถามใหม่อีกครั้งนะคะ';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = 'ระบบขัดข้อง ไม่สามารถเชื่อมต่อ API ได้เลย เช็กอินเทอร์เน็ตหรือรอสักครู่นะคะ';
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
