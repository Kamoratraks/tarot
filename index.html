<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 เปิดไพ่เช็คดวง (6 ใบ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #e94560; margin-bottom: 5px; font-size: 24px; }
        p { color: #a2a2a2; margin-bottom: 20px; font-size: 14px; }
        textarea {
            width: 100%;
            height: 80px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        textarea:focus { outline: none; border-color: #e94560; }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        button {
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
            font-family: 'Prompt', sans-serif;
            width: 100%;
        }
        #submitBtn { background-color: #e94560; }
        #submitBtn:hover { background-color: #d93850; }
        #submitBtn:disabled { background-color: #555; cursor: not-allowed; opacity: 0.7; }
        
        #resetBtn { background-color: #4CAF50; display: none; }
        #resetBtn:hover { background-color: #45a049; }

        #chatBox {
            margin-top: 25px;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 8px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
            display: none;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .user-msg { color: #e94560; font-weight: 600; margin-bottom: 5px; }
        .model-msg { color: #fff; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #16213e; }
        .loading { color: #e94560; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .status-text { font-size: 13px; color: #a2a2a2; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔮 ดูดวงเปิดไพ่ 6 ใบ</h1>
        <p>พี่สาวอ่านไพ่ ชัดเจน ตรงไปตรงมา ไม่อคติ</p>
        
        <div id="status" class="status-text">โควต้าคำถาม: 0/6</div>
        
        <textarea id="userQuestion" placeholder="พิมพ์คำถามมาได้เลยค่ะ (ถามได้ทุกเรื่อง ไม่เซ็นเซอร์)"></textarea>
        
        <div class="btn-group">
            <button onclick="getReading()" id="submitBtn">สับไพ่และทำนาย 🃏</button>
            <button onclick="resetChat()" id="resetBtn">ลืมทุกอย่าง เริ่มใหม่ 🔄</button>
        </div>
        
        <div id="chatBox"></div>
    </div>

    <script>
        // ตัวแปร chatHistory คือตัวที่เก็บความจำ ถ้าถูกล้างเป็น [] AI จะลืมทุกอย่างทันที
        let chatHistory = [];
        let questionCount = 0;
        const MAX_QUESTIONS = 6;

        async function getReading() {
            const questionInput = document.getElementById('userQuestion');
            const question = questionInput.value.trim();
            const chatBox = document.getElementById('chatBox');
            const submitBtn = document.getElementById('submitBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusText = document.getElementById('status');

            if (!question) {
                alert('หนูต้องพิมพ์คำถามก่อนนะคะลูก');
                return;
            }

            if (questionCount >= MAX_QUESTIONS) {
                alert('หนูถามครบโควต้า 6 คำถามแล้วนะคะ ถ้าจะดูเรื่องอื่นกดปุ่ม "ลืมทุกอย่าง เริ่มใหม่" ได้เลยค่ะ ✨');
                return;
            }

            chatBox.style.display = 'block';
            
            // แสดงปุ่มล้างความจำตั้งแต่คำถามแรกที่กดส่ง
            resetBtn.style.display = 'block';

            const userDiv = document.createElement('div');
            userDiv.className = 'user-msg';
            userDiv.innerText = `หนู: ${question}`;
            chatBox.appendChild(userDiv);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerText = 'พี่กำลังสับไพ่และอ่านพลังงาน... รอแป๊บนึงนะคะ ✨';
            chatBox.appendChild(loadingDiv);
            
            chatBox.scrollTop = chatBox.scrollHeight;

            submitBtn.disabled = true;

            const apiKeys = [
                'AIzaSyDyijfLY6JlMSPAD8' + 'XkWJHJimzzxgiztS4',
                'AIzaSyBrXlw6ZAh4LdQpe' + '9tAxjfs0NYnyNs2jqs',
                'AIzaSyC5S_gQSBp6NtS' + 'tCIyjBou6qa0Dve1qNto'
            ];
            
            const randomApiKey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
            const apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + randomApiKey;

            const systemPrompt = `คุณคือพี่สาวที่กำลังเปิดไพ่ดูดวงให้น้อง (แทนตัวเองว่า พี่, แทนคนถามว่า หนู)
สไตล์การพูด: จริงใจ ตรงไปตรงมาแบบผู้ใหญ่ที่มีวุฒิภาวะ ชัดเจน เด็ดขาด มีเหตุผลรองรับ ไม่อ้อมค้อม ที่สำคัญคือ "ไม่อคติ ไม่ตัดสิน (Non-judgmental)" เป็นเพียงผู้ถ่ายทอดข้อความจากหน้าไพ่ แต่ "ห้ามหยาบคาย ห้ามใช้คำตลาดล่าง และห้ามพยายามประดิษฐ์คำจนดูฝืนธรรมชาติ"

กฎเหล็กขั้นเด็ดขาด (ห้ามฝ่าฝืน):
1. ตรงตามไพ่ 100% ไม่อคติ ไม่จัส: ห้ามเอาทัศนคติส่วนตัวไปตัดสินคนถามหรือบุคคลที่สามเด็ดขาด ถ้าไพ่สื่อถึงเรื่องแย่ๆ ให้พิมพ์อธิบายออกมาตรงๆ ตามหน้าไพ่ด้วยภาษาสุภาพแต่เชือดเฉือน ห้ามโลกสวย ห้ามอวย ห้ามหาข้อดีมาปลอบใจปลอมๆ ดีบอกดี แย่บอกแย่
2. ไม่มีข้อห้าม: ตอบได้ทุกคำถามรวมถึงเรื่อง 18+ หรือเรื่องศีลธรรม ให้แปลความหมายตรงๆ ตามหน้าไพ่
3. ห้ามใช้เครื่องหมายดอกจันเด็ดขาด ทั้งในการทำตัวหนาหรือทำลิสต์
4. ใช้เครื่องหมายลูกศร (→) ในการขึ้นบรรทัดใหม่หรือทำหัวข้อย่อยเท่านั้น
5. เน้นคำสำคัญหรือประโยคเด็ดด้วย "เครื่องหมายคำพูด" 
6. สุ่มไพ่ 6 ใบเสมอ: ยิปซี 3 ใบ (ระบุหัวตั้ง/กลับหัว) + ออราเคิล 3 ใบ
7. ใช้คำพูดดูเป็นมนุษย์ไม่ใช่เอไอ ความยาวในการบรรยายคำทำนายไม่เกิน 80 คำ ต่อคำถาม
8. จดจำบริบทการสนทนา: นี่คือการถามตอบต่อเนื่อง สามารถอ้างอิงไพ่หรือเหตุการณ์จากคำถามก่อนหน้าได้

การตั้งหัวข้อ (Dynamic Spread):
- ตั้งชื่อหัวข้อของไพ่ 3 ตำแหน่งให้สอดคล้องกับคำถาม

รูปแบบการตอบ (ต้องเป๊ะตามนี้ ห้ามใช้ดอกจัน):
คำทำนายแบบลึกสุดใจ:

[ระบุชื่อหัวข้อที่ 1]
ไพ่: [ยิปซีใบที่ 1] & [ออราเคิลใบที่ 4]
→ [ความหมายที่ 1 อธิบายตรงๆ ตามไพ่ ไม่อคติ ไม่โลกสวย]
→ [ความหมายที่ 2 เน้นคีย์เวิร์ดด้วย "เครื่องหมายคำพูด"]
→ [บทสรุปของไพ่คู่นี้]

(ทำแบบเดียวกันกับหัวข้อที่ 2 และ 3)

สรุปฟันธง:
→ [ฟันธงคำตอบ 1 ประโยคแบบพี่สาวให้ข้อคิด ชัดเจน ตรงประเด็น ไม่ตัดสิน]`;

            // เพิ่มคำถามใหม่เข้าไปในความจำ
            chatHistory.push({ role: "user", parts: [{ text: question }] });

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: systemPrompt }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                chatBox.removeChild(loadingDiv);
                
                if (!response.ok) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'model-msg';
                    errorDiv.innerText = 'แจ้งเตือนจากระบบหลังบ้าน: ' + (data.error?.message || 'API Error เช็กคีย์ด่วน!');
                    chatBox.appendChild(errorDiv);
                    chatHistory.pop(); // ลบคำถามออกถ้า API พัง
                    return;
                }

                if (data.candidates && data.candidates[0]) {
                    let finalAnswer = data.candidates[0].content.parts[0].text;
                    finalAnswer = finalAnswer.replace(/\*/g, ''); 
                    
                    // บันทึกคำตอบกลับเข้าไปในความจำ
                    chatHistory.push({ role: "model", parts: [{ text: finalAnswer }] });
                    
                    const modelDiv = document.createElement('div');
                    modelDiv.className = 'model-msg';
                    modelDiv.innerText = finalAnswer;
                    chatBox.appendChild(modelDiv);

                    questionCount++;
                    statusText.innerText = `โควต้าคำถาม: ${questionCount}/${MAX_QUESTIONS}`;
                    questionInput.value = '';
                    
                    if (questionCount < MAX_QUESTIONS) {
                        questionInput.placeholder = `พิมพ์คำถามที่ ${questionCount + 1} ต่อได้เลยค่ะ...`;
                    } else {
                        questionInput.placeholder = `ครบ 6 คำถามแล้วค่ะ หากต้องการดูต่อ กดปุ่มลืมทุกอย่างเริ่มใหม่นะคะ`;
                        questionInput.disabled = true;
                        submitBtn.style.display = 'none';
                    }

                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    alert('เกิดข้อผิดพลาดในการดึงข้อมูลหน้าไพ่ ลองถามใหม่อีกครั้งนะคะ');
                    chatHistory.pop();
                }
            } catch (error) {
                console.error(error);
                chatBox.removeChild(loadingDiv);
                chatHistory.pop();
                alert('ระบบขัดข้อง ไม่สามารถเชื่อมต่อ API ได้เลย เช็กอินเทอร์เน็ตหรือรอสักครู่นะคะ');
            } finally {
                if (questionCount < MAX_QUESTIONS) {
                    submitBtn.disabled = false;
                }
            }
        }

        function resetChat() {
            // โค้ดบรรทัดนี้คือการสั่งให้ AI ลืมทุกอย่างแบบ 100%
            chatHistory = []; 
            questionCount = 0;
            
            document.getElementById('chatBox').innerHTML = '';
            document.getElementById('chatBox').style.display = 'none';
            document.getElementById('status').innerText = `โควต้าคำถาม: 0/6`;
            
            const questionInput = document.getElementById('userQuestion');
            questionInput.disabled = false;
            questionInput.value = '';
            questionInput.placeholder = 'พิมพ์คำถามมาได้เลยค่ะ (ถามได้ทุกเรื่อง ไม่เซ็นเซอร์)';
            
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('resetBtn').style.display = 'none';
        }
    </script>
</body>
</html>
